<!DOCTYPE html>
<html>
<head>

    <title>Historial de Abonos</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
<style>
table {
    width: 100%;
}

th,
td {
    text-align: center;
    vertical-align: middle;
}
thead th {
    text-align: center;
}
.table-card table th,
.table-card table td {
    text-align: center;
    vertical-align: middle;
}
</style>
</head>

<body>

<div class="header-title">

    <h2>📜 Historial de Abonos</h2>

    <a href="/cartera" class="logout-btn">
        ⬅ Volver
    </a>

</div>

<br>

<div class="table-card">

<table>

    <thead>
        <tr>
            <th>ID</th>
            <th>Factura</th>
            <th>Cliente</th>
            <th>Abono</th>
            <th>Forma Pago</th>
            <th>Fecha</th>
            <th>Observación</th>
        </tr>
    </thead>

    <tbody>

        {% for p in pagos %}
        <tr>

            <td>#{{ p.id }}</td>

            <td>#{{ p.factura_id }}</td>

            <td>{{ p.cliente }}</td>

            <td style="color:green; font-weight:bold;">
                ${{ "{:,.0f}".format(p.abono or 0) }}
            </td>

            <td>
                {{ p.forma_pago or "-" }}
            </td>

            <td>{{ p.fecha }}</td>

            <td>
                {{ p.observacion or "-" }}
            </td>

        </tr>
        {% endfor %}

    </tbody>

</table>

</div>

</body>
</html>
