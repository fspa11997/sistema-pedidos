<div class="factura-simple-container">

    <h2>🧾 Factura Simple</h2>

    <form method="POST" action="/guardar_factura_simple" class="factura-form">

        <input
            type="text"
            name="nombre"
            placeholder="👤 Nombre"
            required
        >

        <input
            type="text"
            name="numero"
            placeholder="🔢 Número"
            required
        >

        <button type="submit">
            💾 Guardar
        </button>

    </form>

    <hr>

    <h3>📋 Registros</h3>

    <div class="tabla-container">

        <table class="tabla-facturas">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Número</th>
                    <th>Fecha</th>
                </tr>
            </thead>

            <tbody>

                {% for f in facturas %}
                <tr>
                    <td>#{{ f.id }}</td>
                    <td>{{ f.nombre }}</td>
                    <td>{{ f.numero }}</td>
                    <td>{{ f.fecha }}</td>
                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

</div>
