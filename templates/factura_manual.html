<h2>🧾 Factura Manual</h2>

<form method="POST" action="/guardar_factura_manual">

    <input
        type="text"
        name="cliente"
        placeholder="Nombre cliente"
        required
    >

    <input
        type="text"
        name="numero"
        placeholder="Número / Referencia"
        required
    >

    <button type="submit">
        Crear Factura
    </button>

</form>
